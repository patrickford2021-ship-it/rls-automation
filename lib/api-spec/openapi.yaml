openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: RLS Automation Hub API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stats
    description: Call statistics
  - name: calls
    description: Call management
  - name: queue
    description: Call queue management
  - name: transcripts
    description: Call transcripts
  - name: learnings
    description: AI learnings
  - name: training
    description: Sales training
  - name: sarah
    description: Sarah AI controls
  - name: texter
    description: Follow-up texter
  - name: callbacks
    description: Scheduled callbacks
  - name: leads
    description: CRM leads
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get call statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

  /call:
    post:
      operationId: makeCall
      tags: [calls]
      summary: Initiate a call to a business
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MakeCallRequest"
      responses:
        "200":
          description: Call initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallResponse"

  /queue:
    get:
      operationId: getQueue
      tags: [queue]
      summary: Get current queue state
      responses:
        "200":
          description: Queue state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Queue"

  /queue/add:
    post:
      operationId: addToQueue
      tags: [queue]
      summary: Add leads to call queue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddToQueueRequest"
      responses:
        "200":
          description: Leads added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddToQueueResponse"

  /queue/start:
    post:
      operationId: startQueue
      tags: [queue]
      summary: Start processing the queue
      responses:
        "200":
          description: Queue started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /queue/pause:
    post:
      operationId: pauseQueue
      tags: [queue]
      summary: Pause queue processing
      responses:
        "200":
          description: Queue paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /queue/resume:
    post:
      operationId: resumeQueue
      tags: [queue]
      summary: Resume queue processing
      responses:
        "200":
          description: Queue resumed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /queue/clear:
    post:
      operationId: clearQueue
      tags: [queue]
      summary: Clear the queue
      responses:
        "200":
          description: Queue cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /transcripts:
    get:
      operationId: getTranscripts
      tags: [transcripts]
      summary: Get call transcripts
      responses:
        "200":
          description: Transcripts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transcript"

  /learnings:
    get:
      operationId: getLearnings
      tags: [learnings]
      summary: Get AI learnings from calls
      responses:
        "200":
          description: Learnings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Learnings"

  /training:
    get:
      operationId: getTraining
      tags: [training]
      summary: Get training videos and techniques
      responses:
        "200":
          description: Training data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Training"

  /training/add:
    post:
      operationId: addTraining
      tags: [training]
      summary: Add a YouTube training video
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTrainingRequest"
      responses:
        "200":
          description: Training added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddTrainingResponse"

  /sarah/status:
    get:
      operationId: getSarahStatus
      tags: [sarah]
      summary: Get Sarah AI status
      responses:
        "200":
          description: Sarah status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SarahStatus"

  /sarah/enable:
    post:
      operationId: enableSarah
      tags: [sarah]
      summary: Enable Sarah AI
      responses:
        "200":
          description: Sarah enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SarahStatus"

  /sarah/disable:
    post:
      operationId: disableSarah
      tags: [sarah]
      summary: Disable Sarah AI
      responses:
        "200":
          description: Sarah disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SarahStatus"

  /test-texter:
    post:
      operationId: testTexter
      tags: [texter]
      summary: Send test follow-up texts now
      responses:
        "200":
          description: Texts sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResponse"

  /leads:
    get:
      operationId: getLeads
      tags: [leads]
      summary: Get today's follow-up leads from CRM
      responses:
        "200":
          description: Leads
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadsResponse"

  /callbacks:
    get:
      operationId: getCallbacks
      tags: [callbacks]
      summary: Get scheduled callbacks
      responses:
        "200":
          description: Callbacks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Callback"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Stats:
      type: object
      properties:
        totalCalls:
          type: integer
        transfers:
          type: integer
        rickTransfers:
          type: integer
        vedderTransfers:
          type: integer
        noAnswers:
          type: integer
        voicemails:
          type: integer
        hangups:
          type: integer
        nextTransferTo:
          type: string
      required:
        - totalCalls
        - transfers
        - rickTransfers
        - vedderTransfers
        - noAnswers
        - voicemails
        - hangups
        - nextTransferTo

    MakeCallRequest:
      type: object
      properties:
        phone:
          type: string
        businessName:
          type: string
      required:
        - phone
        - businessName

    CallResponse:
      type: object
      properties:
        success:
          type: boolean
        callSid:
          type: string
        error:
          type: string

    QueueItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        phone:
          type: string
        status:
          type: string
          enum: [pending, calling, completed, failed]
        callSid:
          type: string
        startedAt:
          type: string
        error:
          type: string
      required:
        - id
        - name
        - phone
        - status

    Queue:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/QueueItem"
        active:
          type: boolean
        currentIndex:
          type: integer
        paused:
          type: boolean
        completed:
          type: integer
        failed:
          type: integer
      required:
        - items
        - active
        - currentIndex
        - paused

    AddToQueueRequest:
      type: object
      properties:
        leads:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              phone:
                type: string
            required:
              - name
              - phone
      required:
        - leads

    AddToQueueResponse:
      type: object
      properties:
        success:
          type: boolean
        added:
          type: integer
        error:
          type: string

    ActionResponse:
      type: object
      properties:
        success:
          type: boolean
        error:
          type: string

    TranscriptLine:
      type: object
      properties:
        speaker:
          type: string
        text:
          type: string
        time:
          type: string
      required:
        - speaker
        - text

    Transcript:
      type: object
      properties:
        id:
          type: string
        businessName:
          type: string
        outcome:
          type: string
        transferredTo:
          type: string
        transcript:
          type: array
          items:
            $ref: "#/components/schemas/TranscriptLine"
        duration:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - businessName
        - outcome
        - createdAt

    Learnings:
      type: object
      properties:
        insights:
          type: array
          items:
            type: string
        lastUpdated:
          type: string
          nullable: true
        totalAnalyzed:
          type: integer
      required:
        - insights
        - totalAnalyzed

    TrainingVideo:
      type: object
      properties:
        videoId:
          type: string
        title:
          type: string
        channel:
          type: string
        url:
          type: string
        addedAt:
          type: string
        techniques:
          type: array
          items:
            type: string
      required:
        - videoId
        - title
        - channel

    Training:
      type: object
      properties:
        videos:
          type: array
          items:
            $ref: "#/components/schemas/TrainingVideo"
        techniques:
          type: array
          items:
            type: string
        lastUpdated:
          type: string
          nullable: true
      required:
        - videos
        - techniques

    AddTrainingRequest:
      type: object
      properties:
        url:
          type: string
      required:
        - url

    AddTrainingResponse:
      type: object
      properties:
        success:
          type: boolean
        title:
          type: string
        techniques:
          type: array
          items:
            type: string
        error:
          type: string

    SarahStatus:
      type: object
      properties:
        sarahEnabled:
          type: boolean
        sarahPausedAt:
          type: string
          nullable: true
        enabled:
          type: boolean
      required:
        - sarahEnabled

    LeadsResponse:
      type: object
      properties:
        leads:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              phone:
                type: string
              notes:
                type: string
              contactedBy:
                type: string
              status:
                type: string
      required:
        - leads

    Callback:
      type: object
      properties:
        id:
          type: string
        businessName:
          type: string
        phone:
          type: string
        requestedTime:
          type: string
        repName:
          type: string
        createdAt:
          type: string
        status:
          type: string
      required:
        - id
        - businessName
        - phone
        - requestedTime
        - repName
